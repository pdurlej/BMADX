<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">BMADX Codex guardrail flow</title>
  <desc id="desc">A plain-English product task enters BMADX. BMADX chooses the lightest safe mode, keeps BMAD as the process source of truth, and asks for proof before done.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="58%" stop-color="#10243a" />
      <stop offset="100%" stop-color="#14352f" />
    </linearGradient>
    <linearGradient id="core" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="124%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000816" flood-opacity="0.34" />
    </filter>
    <style>
      .eyebrow { font: 800 24px "Avenir Next", "Inter", Arial, sans-serif; fill: #7dd3fc; }
      .title { font: 900 58px "Avenir Next", "Inter", Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 600 27px "Avenir Next", "Inter", Arial, sans-serif; fill: #cbd5e1; }
      .card-title { font: 900 32px "Avenir Next", "Inter", Arial, sans-serif; fill: #f8fafc; }
      .card-text { font: 600 22px "Avenir Next", "Inter", Arial, sans-serif; fill: #cbd5e1; }
      .core-title { font: 900 38px "Avenir Next", "Inter", Arial, sans-serif; fill: #062236; }
      .core-text { font: 700 23px "Avenir Next", "Inter", Arial, sans-serif; fill: #0f3a4f; }
      .small { font: 700 21px "Avenir Next", "Inter", Arial, sans-serif; fill: #fef3c7; }
      .line { stroke: #5eead4; stroke-width: 5; fill: none; stroke-linecap: round; }
      .muted-line { stroke: #93c5fd; stroke-width: 4; fill: none; stroke-linecap: round; opacity: 0.45; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />
  <circle cx="1110" cy="70" r="230" fill="#14b8a6" opacity="0.10" />
  <circle cx="170" cy="600" r="250" fill="#60a5fa" opacity="0.10" />
  <path d="M-30 168 C220 62 420 82 640 164 C850 244 1040 188 1320 70" stroke="#38bdf8" stroke-width="3" opacity="0.12" fill="none" />
  <path d="M-20 530 C230 450 472 484 690 548 C910 612 1060 578 1320 500" stroke="#5eead4" stroke-width="3" opacity="0.12" fill="none" />

  <text x="76" y="96" class="eyebrow">BMAD-FIRST CODEX GUARDRAILS</text>
  <text x="76" y="170" class="title">Small tasks stay small.</text>
  <text x="76" y="222" class="subtitle">Risky work escalates. Messy repos get Rescue Mode.</text>

  <rect x="82" y="310" width="270" height="144" rx="28" fill="#0f2238" stroke="#365672" stroke-width="2" filter="url(#shadow)" />
  <text x="118" y="364" class="card-title">Plain task</text>
  <text x="118" y="404" class="card-text">Describe the product</text>
  <text x="118" y="434" class="card-text">outcome in English.</text>

  <path class="line" d="M352 382 H470" />

  <rect x="470" y="286" width="340" height="192" rx="34" fill="url(#core)" filter="url(#shadow)" />
  <text x="518" y="350" class="core-title">BMADX routes</text>
  <text x="518" y="394" class="core-text">X1 tiny fix</text>
  <text x="518" y="426" class="core-text">X2 bounded change</text>
  <text x="518" y="458" class="core-text">X3 BMAD work / X4 rescue</text>

  <path class="line" d="M810 382 H930" />

  <rect x="930" y="310" width="270" height="144" rx="28" fill="#2b1d05" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)" />
  <text x="966" y="364" class="card-title">Proof before done</text>
  <text x="966" y="404" class="card-text">BMAD owns process.</text>
  <text x="966" y="434" class="small">BMAD &gt; BMADX</text>

  <path class="muted-line" d="M640 478 V548 H220" />
  <text x="236" y="558" class="subtitle">Keep the guardrail light until risk demands more.</text>
</svg>
